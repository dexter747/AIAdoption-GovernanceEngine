appId: ai.nexus.desktop
productName: Velanova
copyright: Copyright © 2026 Velanova

directories:
  output: dist
  buildResources: build

files:
  - "**/*"
  - "!**/.git"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/node_modules/*.d.ts"
  - "!**/node_modules/.bin"
  - "!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}"
  - "!.editorconfig"
  - "!**/._*"
  - "!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,.gitignore,.gitattributes}"
  - "!**/{__pycache__,thumbs.db,.flowconfig,.idea,.vs,.nyc_output}"
  - "!**/{appveyor.yml,.travis.yml,circle.yml}"
  - "!**/{npm-debug.log,yarn.lock,.yarn-integrity,.yarn-metadata.json}"

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extraResources:
    - from: "node_modules/@modelcontextprotocol"
      to: "mcp-servers"
      filter: ["**/*"]
    - from: "../../packages/mcp-servers"
      to: "mcp-servers-custom"
      filter: ["*/dist/**", "*/package.json"]

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

win:
  target:
    - target: nsis
      arch: [x64, ia32]
    - target: portable
      arch: [x64, ia32]
  icon: build/icon.ico
  extraResources:
    - from: "node_modules/@modelcontextprotocol"
      to: "mcp-servers"
      filter: ["**/*"]
    - from: "../../packages/mcp-servers"
      to: "mcp-servers-custom"
      filter: ["*/dist/**", "*/package.json"]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Velanova
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  include: build/installer.nsh

linux:
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]
    - target: rpm
      arch: [x64, arm64]
  category: Office
  icon: build/icons
  extraResources:
    - from: "node_modules/@modelcontextprotocol"
      to: "mcp-servers"
      filter: ["**/*"]
    - from: "../../packages/mcp-servers"
      to: "mcp-servers-custom"
      filter: ["*/dist/**", "*/package.json"]

appImage:
  license: LICENSE

deb:
  depends:
    - gconf2
    - gconf-service
    - libnotify4
    - libappindicator1
    - libxtst6
    - libnss3

rpm:
  depends:
    - libXScrnSaver

publish:
  provider: generic
  url: https://releases.velanova.com
  channel: latest

# Auto-updater configuration
electronUpdaterCompatibility: ">=2.16"
