name: Desktop App Build

on:
  push:
    branches: [main]
    paths:
      - 'apps/desktop-app/**'
      - '.github/workflows/desktop.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/desktop-app/**'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create release'
        required: false
        default: 'false'

env:
  NODE_VERSION: '20'

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Desktop App
        run: cd apps/desktop-app && pnpm build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: cd apps/desktop-app && pnpm package:mac
        env:
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: cd apps/desktop-app && pnpm package:win

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cd apps/desktop-app && pnpm package:linux

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            apps/desktop-app/dist/*.dmg
            apps/desktop-app/dist/*.exe
            apps/desktop-app/dist/*.AppImage
            apps/desktop-app/dist/*.deb
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.release == 'true'
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            desktop-macos-latest/*.dmg
            desktop-windows-latest/*.exe
            desktop-ubuntu-latest/*.AppImage
            desktop-ubuntu-latest/*.deb
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
