name: Desktop App Build

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
    paths:
      - 'apps/desktop-app/**'
      - '.github/workflows/desktop.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/desktop-app/**'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create release'
        required: false
        default: 'false'
      version:
        description: 'Version to release (e.g., 1.0.1)'
        required: false

env:
  NODE_VERSION: '20'

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Desktop App
        run: cd apps/desktop-app && pnpm build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: cd apps/desktop-app && pnpm package:mac
        env:
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: cd apps/desktop-app && pnpm package:win

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cd apps/desktop-app && pnpm package:linux

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            apps/desktop-app/dist/*.dmg
            apps/desktop-app/dist/*.exe
            apps/desktop-app/dist/*.AppImage
            apps/desktop-app/dist/*.deb
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.release == 'true' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=$(node -p "require('./apps/desktop-app/package.json').version")" >> $GITHUB_OUTPUT
          fi

      - name: Generate Release Notes
        id: notes
        run: |
          echo "# Velanova Desktop v${{ steps.version.outputs.version }}" > release_notes.md
          echo "" >> release_notes.md
          echo "## What's New" >> release_notes.md
          echo "- Desktop application release" >> release_notes.md
          echo "" >> release_notes.md
          echo "## Downloads" >> release_notes.md
          echo "- **macOS**: Velanova-${{ steps.version.outputs.version }}.dmg" >> release_notes.md
          echo "- **Windows**: Velanova-Setup-${{ steps.version.outputs.version }}.exe" >> release_notes.md
          echo "- **Linux**: Velanova-${{ steps.version.outputs.version }}.AppImage or .deb" >> release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Velanova Desktop v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          files: |
            desktop-macos-latest/*.dmg
            desktop-windows-latest/*.exe
            desktop-ubuntu-latest/*.AppImage
            desktop-ubuntu-latest/*.deb
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
